services:
  node: &node
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./:/app
    stdin_open: true
    tty: true
    command: sleep infinity

  showcase:
    <<: *node
    command: corepack yarn showcase
    labels:
      traefik.port: 5173
      traefik.enable: 'true'
      traefik.http.routers.omnicajs-icons-showcase.rule: 'HostRegexp(`icons.omnicajs.{[^.]+}`)'
      traefik.http.routers.omnicajs-icons-showcase.priority: 1
      traefik.http.routers.omnicajs-icons-showcase.service: omnicajs-icons-showcase
      traefik.http.services.omnicajs-icons-showcase.loadbalancer.server.port: '5173'
      dev.orbstack.domains: 'icons.omnicajs.local'

  playwright:
    build:
      context: ./docker/playwright
      dockerfile: Dockerfile
    working_dir: /app
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    volumes:
      - ./:/app
    ipc: host
    init: true
